<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Maternal Health Uganda</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<header>
           <!-- back -->
<div class="back-to-home">
    <a href="index.html" class="back-link">
        <span class="back-arrow">←</span> Back to Home
    </a>
</div>
    <div id="left-header">
        <a href="index.html" id="logo">Maternal Health Uganda</a>
    </div>
    <nav id="right-header">
        Don't have an account? <a href="signup.html">Sign Up</a>
    </nav>
</header>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="brand-mark">🌸</div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to continue your pregnancy journey</p>

        <div id="authMsg" class="msg"></div>

        <div class="field">
            <label>Email Address</label>
            <div class="input-wrap">
                <div class="icon">
                    <img src="../Images/envelope-solid-full.svg" alt="">
                </div>
                <div class="input-divider"></div>
                <input type="email" id="loginEmail" placeholder="your@email.com" required>
            </div>
        </div>

        <div class="field">
            <label>Password</label>
            <div class="input-wrap">
                <div class="icon">
                    <img src="../Images/user-solid-full.svg" alt="">
                </div>
                <div class="input-divider"></div>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
        </div>

        <button class="btn-submit" id="loginBtn" onclick="doLogin()">LOG IN</button>

        <div class="divider">or</div>

        <button class="btn-guest" onclick="window.location.href='index.html'">Continue as Guest</button>

    </div>
</div>

<script>
async function doLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msg      = document.getElementById('authMsg');
    const btn      = document.getElementById('loginBtn');

    msg.className = 'msg';
    msg.textContent = '';

    if (!email || !password) {
        msg.textContent = 'Please enter your email and password.';
        msg.className   = 'msg error';
        return;
    }

    btn.textContent = 'Signing in...';
    btn.disabled    = true;

    const formData = new FormData();
    formData.append('email',    email);
    formData.append('password', password);

    try {
        const res  = await fetch('../backend/login.php', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.success) {
            msg.textContent = 'Login successful! Redirecting...';
            msg.className   = 'msg success';
            setTimeout(() => { window.location.href = data.redirect || 'index.html'; }, 800);
        } else {
            msg.textContent = data.error || 'Login failed. Please try again.';
            msg.className   = 'msg error';
            btn.textContent = 'LOG IN';
            btn.disabled    = false;
        }
    } catch (err) {
        msg.textContent = 'Network error. Please make sure XAMPP is running.';
        msg.className   = 'msg error';
        btn.textContent = 'LOG IN';
        btn.disabled    = false;
    }
}

// Allow pressing Enter to submit
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});
</script>

</body>
</html>
