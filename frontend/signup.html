<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Maternal Health Uganda</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<header>
            <!-- back -->
<div class="back-to-home">
    <a href="index.html" class="back-link">
        <span class="back-arrow">←</span> Back to Home
    </a>
    <div id="left-header">
        <a href="index.html" id="logo">Maternal Health Uganda</a>
    </div>
    <nav id="right-header">
        Already have an account? <a href="login.html">Login</a>
    </nav>
</header>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="brand-mark">🤰</div>
        <h1>Create Account</h1>
        <p class="subtitle">Join thousands of mothers across Uganda</p>

        <div id="authMsg" class="msg"></div>

        <div class="field">
            <label>Full Name</label>
            <div class="input-wrap">
                <div class="icon">
                    <img src="../Images/user-solid-full.svg" alt="">
                </div>
                <div class="input-divider"></div>
                <input type="text" id="regFullname" placeholder="Your full name" required>
            </div>
        </div>

        <div class="field">
            <label>Email Address</label>
            <div class="input-wrap">
                <div class="icon">
                    <img src="../Images/envelope-solid-full.svg" alt="">
                </div>
                <div class="input-divider"></div>
                <input type="email" id="regEmail" placeholder="your@email.com" required>
            </div>
        </div>

        <div class="field">
            <label>Password</label>
            <div class="input-wrap">
                <div class="icon">
                    <img src="../Images/user-solid-full.svg" alt="">
                </div>
                <div class="input-divider"></div>
                <input type="password" id="regPassword" placeholder="Minimum 6 characters" required>
            </div>
        </div>

        <div class="field">
            <span class="gender-label">Gender</span>
            <div class="gender-options">
                <label class="gender-opt">
                    <input type="radio" name="gender" value="M">
                    <img src="../Images/person-solid-full.svg" style="width:18px;height:18px;opacity:.6" alt="">
                    Male
                </label>
                <label class="gender-opt">
                    <input type="radio" name="gender" value="F">
                    <img src="../Images/person-dress-solid-full.svg" style="width:18px;height:18px;opacity:.6" alt="">
                    Female
                </label>
            </div>
        </div>

        <button class="btn-submit" id="regBtn" onclick="doSignup()">CREATE ACCOUNT</button>

        <div class="divider">or</div>

        <button class="btn-guest" onclick="window.location.href='index.html'">Continue as Guest</button>

    </div>
</div>

<script>
async function doSignup() {
    const fullname = document.getElementById('regFullname').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const gender   = document.querySelector('input[name="gender"]:checked')?.value || '';
    const msg      = document.getElementById('authMsg');
    const btn      = document.getElementById('regBtn');

    msg.className   = 'msg';
    msg.textContent = '';

    if (!fullname || !email || !password || !gender) {
        msg.textContent = 'Please fill in all fields and select a gender.';
        msg.className   = 'msg error';
        return;
    }

    btn.textContent = 'Creating account...';
    btn.disabled    = true;

    const formData = new FormData();
    formData.append('fullname', fullname);
    formData.append('email',    email);
    formData.append('password', password);
    formData.append('gender',   gender);

    try {
        const res  = await fetch('../backend/signup.php', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.success) {
            msg.textContent = data.message || 'Account created! Redirecting to login...';
            msg.className   = 'msg success';
            setTimeout(() => { window.location.href = 'login.html'; }, 1800);
        } else {
            msg.textContent = data.error || 'Registration failed. Please try again.';
            msg.className   = 'msg error';
            btn.textContent = 'CREATE ACCOUNT';
            btn.disabled    = false;
        }
    } catch (err) {
        msg.textContent = 'Network error. Please make sure XAMPP is running.';
        msg.className   = 'msg error';
        btn.textContent = 'CREATE ACCOUNT';
        btn.disabled    = false;
    }
}

// Log page view for metrics
window.addEventListener('load', () => {
    const f = new FormData();
    f.append('page', 'signup');
    fetch('../backend/logpageview.php', { method: 'POST', body: f }).catch(() => {});
});
</script>

</body>
</html>
