<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Maternal Health Uganda</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="signup.css">
</head>
<body>
<header>
        <!-- back -->
<div class="back-to-home">
    <a href="index.html" class="back-link">
        <span class="back-arrow">←</span> Back to Home
    </a>
</div>
    
    <div id="left-header">
        <a href="index.html" id="logo">Maternal Health Uganda</a>
    </div>
    <nav id="right-header">
        Already have an account? <a href="login.html">Login</a>
    </nav>
</header>

<div id="login-signup">
    <div class="signup-container">
        <form id="signupForm">
            <div class="form-title">Register</div>

            <div id="signupError"   class="error-msg"   style="display:none;"></div>
            <div id="signupSuccess" class="success-msg" style="display:none;"></div>

            <div class="fullname-input-wrapper">
                <img src="../Images/user-solid-full.svg" class="fa-icons" alt="">
                <div class="separator"></div>
                <input type="text" name="Fullname" placeholder="Full Name" class="name-entry" required>
            </div>

            <div class="email-input-wrapper">
                <img src="../Images/envelope-solid-full.svg" class="fa-icons" alt="">
                <div class="separator"></div>
                <input type="email" name="email" placeholder="Email" class="email-entry" required>
            </div>

            <div class="gender-input-wrapper">
                <div class="title-for-radio-input">
                    <span class="horizontal-separator"></span>
                    <h4 class="title">Gender</h4>
                    <span class="horizontal-separator"></span>
                </div>
                <div class="gender-male">
                    <img src="../Images/person-solid-full.svg" class="fa-icons" alt="">
                    <div class="separator"></div>
                    <input type="radio" name="gender" value="M" required> Male
                </div>
                <div class="gender-female">
                    <img src="../Images/person-dress-solid-full.svg" class="fa-icons" alt="">
                    <div class="separator"></div>
                    <input type="radio" name="gender" value="F"> Female
                </div>
            </div>

            <div class="password-input-wrapper">
                <img src="../Images/user-solid-full.svg" class="fa-icons" alt="">
                <div class="separator"></div>
                <input type="password" name="Password" placeholder="Password (min 6 chars)" class="password-entry" required>
            </div>

            <button type="submit" class="login-register">REGISTER</button>
        </form>
    </div>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errorDiv   = document.getElementById('signupError');
    const successDiv = document.getElementById('signupSuccess');
    errorDiv.style.display   = 'none';
    successDiv.style.display = 'none';

    const formData = new FormData(this);

    try {
        const res  = await fetch('../backend/signup.php', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.success) {
            successDiv.textContent = data.message + ' Redirecting to login...';
            successDiv.style.display = 'block';
            this.reset();
            setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
            errorDiv.textContent = data.error || (data.errors && data.errors.join(', ')) || 'Registration failed.';
            errorDiv.style.display = 'block';
        }
    } catch (err) {
        errorDiv.textContent = 'Network error. Is your server running?';
        errorDiv.style.display = 'block';
    }
});
</script>
</body>
</html>
